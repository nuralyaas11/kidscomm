<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidsComm - Register</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind Theme Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        primary: '#FF6B6B',
                        secondary: '#4ECDC4',
                        accent: '#FFE66D',
                        dark: '#2B2D42',
                    }
                }
            }
        }
    </script>

    <style>
        .role-card { transition: all 0.2s ease-in-out; }
        .role-card.selected {
            border-color: #4ECDC4;
            background-color: #f0fffe;
            box-shadow: 4px 4px 0px #2B2D42;
        }
        .role-card:not(.selected) {
            border-color: #e5e7eb;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-secondary via-blue-200 to-primary min-h-screen flex items-center justify-center p-4">

    <!-- Register Box -->
    <div class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 relative overflow-hidden my-8">
        <!-- Decorative Elements -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-accent rounded-full opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-primary rounded-full opacity-50"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-gray-800 mb-2 tracking-tight">Kids<span class="text-primary">Comm</span></h1>
                <p class="text-gray-500 font-medium">Create your account</p>
            </div>

            <form id="registerForm" class="space-y-5">

                <!-- Role Selector -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-3">I am a...</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="roleStudent" onclick="selectRole('customer')"
                            class="role-card border-2 rounded-xl p-4 text-center cursor-pointer selected">
                            <div class="text-3xl mb-2">🎒</div>
                            <p class="font-black text-gray-800">Student</p>
                            <p class="text-xs text-gray-500 font-medium mt-1">Play games & quizzes</p>
                        </button>
                        <button type="button" id="roleTeacher" onclick="selectRole('admin')"
                            class="role-card border-2 rounded-xl p-4 text-center cursor-pointer">
                            <div class="text-3xl mb-2">👨‍🏫</div>
                            <p class="font-black text-gray-800">Teacher</p>
                            <p class="text-xs text-gray-500 font-medium mt-1">Monitor & manage students</p>
                        </button>
                    </div>
                </div>

                <!-- Nickname -->
                <div>
                    <label for="nickname" class="block text-sm font-bold text-gray-700 mb-2">
                        Nickname <span class="text-gray-400 font-normal">(displayed in the app)</span>
                    </label>
                    <input type="text" id="nickname" required maxlength="30"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-secondary focus:ring-2 focus:ring-secondary focus:outline-none transition-colors bg-gray-50 font-semibold"
                        placeholder="e.g. Alex">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-secondary focus:ring-2 focus:ring-secondary focus:outline-none transition-colors bg-gray-50 font-semibold"
                        placeholder="example@email.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-colors bg-gray-50 font-semibold"
                        placeholder="At least 6 characters">
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-bold text-gray-700 mb-2">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="6"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-colors bg-gray-50 font-semibold"
                        placeholder="Repeat your password">
                </div>

                <button type="submit" id="registerBtn"
                    class="w-full bg-secondary hover:bg-teal-500 text-white font-black text-lg py-3 px-4 rounded-xl transition-transform transform hover:scale-105 shadow-lg">
                    Create Account 🚀
                </button>

                <div id="errorMessage" class="hidden text-center text-red-500 font-semibold text-sm bg-red-50 py-2 px-3 rounded-lg border border-red-200">
                    <!-- Error messages displayed here -->
                </div>

                <div id="successMessage" class="hidden text-center text-green-600 font-semibold text-sm bg-green-50 py-2 px-3 rounded-lg border border-green-200">
                    <!-- Success message displayed here -->
                </div>

                <p class="text-center text-gray-500 text-sm font-medium">
                    Already have an account?
                    <a href="./index.html" class="text-secondary font-bold hover:underline">Log in here</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Firebase Module -->
    <script type="module">
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { auth, db } from "./firebase-config.js";

        // --- Role Selection ---
        let selectedRole = 'customer'; // default: student

        window.selectRole = function(role) {
            selectedRole = role;
            const studentCard = document.getElementById('roleStudent');
            const teacherCard = document.getElementById('roleTeacher');

            if (role === 'customer') {
                studentCard.classList.add('selected');
                teacherCard.classList.remove('selected');
            } else {
                teacherCard.classList.add('selected');
                studentCard.classList.remove('selected');
            }
        };

        // --- Register Form Submit ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // Hide messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // Client-side validation
            if (!nickname) {
                errorMessage.textContent = 'Please enter a nickname.';
                errorMessage.classList.remove('hidden');
                return;
            }
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match. Please try again.';
                errorMessage.classList.remove('hidden');
                return;
            }

            // Loading state
            registerBtn.disabled = true;
            registerBtn.innerHTML = 'Creating account...';

            try {
                // 1. Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save user profile to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    nickname: nickname,
                    email: email,
                    role: selectedRole,
                    createdAt: serverTimestamp()
                });

                // 3. Show success and redirect
                successMessage.textContent = `Account created successfully! Redirecting you...`;
                successMessage.classList.remove('hidden');

                setTimeout(() => {
                    if (selectedRole === 'admin') {
                        window.location.href = './admin/dashboard.html';
                    } else {
                        window.location.href = './customer/dashboard.html';
                    }
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);

                if (error.code === 'auth/email-already-in-use') {
                    errorMessage.textContent = 'This email is already registered. Please log in instead.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage.textContent = 'Invalid email address. Please check and try again.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage.textContent = 'Password is too weak. Please use at least 6 characters.';
                } else {
                    errorMessage.textContent = 'Registration failed. Please try again shortly.';
                }

                errorMessage.classList.remove('hidden');
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Create Account 🚀';
            }
        });
    </script>
</body>
</html>
